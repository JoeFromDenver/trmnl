<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRMNL Baseline Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .trmnl-hardware {
            background-color: #1f2937;
            padding: 24px 24px 64px 24px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .trmnl-hardware-logo {
            position: absolute;
            bottom: 20px;
            color: #374151;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.15em;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: sans-serif;
        }

        .trmnl-screen {
            width: 800px;
            height: 480px;
            background-color: white;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            border: 2px solid #111827;
        }
    </style>
</head>

<body>

    <div class="trmnl-hardware">
        <div class="trmnl-screen">
            <div
                class="layout layout--col font-sans bg-white text-black w-full h-full flex flex-col justify-between overflow-hidden">
                <svg width="120" height="120" fill="#808080" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                    style="position: absolute; top: -0.25rem; left: 0.5rem;">
                    <path
                        d="M13 14.725c0-5.141 3.892-10.519 10-11.725l.984 2.126c-2.215.835-4.163 3.742-4.38 5.746 2.491.392 4.396 2.547 4.396 5.149 0 3.182-2.584 4.979-5.199 4.979-3.015 0-5.801-2.305-5.801-6.275zm-13 0c0-5.141 3.892-10.519 10-11.725l.984 2.126c-2.215.835-4.163 3.742-4.38 5.746 2.491.392 4.396 2.547 4.396 5.149 0 3.182-2.584 4.979-5.199 4.979-3.015 0-5.801-2.305-5.801-6.275z" />
                </svg>

                <svg width="120" height="120" fill="#808080" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                    style="position: absolute; bottom: -0.25rem; right: 0.5rem;">
                    <g transform="scale(-1, 1) translate(-24, 0)">
                        <path
                            d="M13 14.725c0-5.141 3.892-10.519 10-11.725l.984 2.126c-2.215.835-4.163 3.742-4.38 5.746 2.491.392 4.396 2.547 4.396 5.149 0 3.182-2.584 4.979-5.199 4.979-3.015 0-5.801-2.305-5.801-6.275zm-13 0c0-5.141 3.892-10.519 10-11.725l.984 2.126c-2.215.835-4.163 3.742-4.38 5.746 2.491.392 4.396 2.547 4.396 5.149 0 3.182-2.584 4.979-5.199 4.979-3.015 0-5.801-2.305-5.801-6.275z" />
                    </g>
                </svg>

                <!-- BRANDING LOGO -->
                <div
                    style="position: absolute; bottom: 0.5rem; left: calc(0.5rem + 60px); transform: translateX(-50%); display: flex; align-items: center; gap: 0.75rem;">
                    <svg width="32" height="42" viewBox="0 0 36 48" fill="none" stroke="#4b5563" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="4" width="24" height="30" rx="3" />
                        <rect x="12" y="10" width="12" height="18" rx="1" stroke-width="2" />
                        <line x1="18" y1="34" x2="18" y2="42" />
                        <line x1="10" y1="42" x2="26" y2="42" stroke-width="4" />
                    </svg>
                    <div
                        style="font-size: 2.25rem; font-weight: 500; color: #4b5563; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; align-items: flex-start;">
                        MM<span
                            style="font-size: 1.3rem; font-weight: 700; line-height: 1; margin-left: 0.1rem;">2</span>
                    </div>
                </div>

                <div class="flex-1 flex flex-col justify-center items-center z-10 break-words overflow-hidden w-full"
                    style="padding: 0 8rem;">
                    <p class="tracking-tight"
                        style="font-size: 6rem; line-height: 1.1; text-align: center; font-weight: 400; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
                        There's no place like home</p>
                </div>
            </div>
        </div>

        <div class="trmnl-hardware-logo">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M11 2L9.5 8.5L3 7L7.5 12L3 17L9.5 15.5L11 22H13L14.5 15.5L21 17L16.5 12L21 7L14.5 8.5L13 2H11Z" />
            </svg>
            TRMNL
        </div>
    </div>

</body>

</html>
